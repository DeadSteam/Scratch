name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

# Cancel any in-flight run for the same PR/branch when a new push arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (lint + type + test)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies (incl. test extras)
        run: uv sync --frozen --extra test

      - name: Ruff lint
        # --no-fix in CI so we never auto-mutate code on the runner.
        run: uv run ruff check --no-fix src tests

      - name: Type check (ty)
        run: uv run ty check src

      - name: Tests + coverage
        run: |
          uv run pytest -m "not integration" \
            --cov \
            --cov-report=term \
            --cov-report=xml \
            --cov-fail-under=40

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint:check

      - name: Build
        run: npm run build
        env:
          # Don't fail the build on warnings (existing webpack bundle-size
          # warning — tracked separately, see code-splitting backlog).
          CI: ""

  docker-build:
    name: Docker image build smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: scratch-app:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
