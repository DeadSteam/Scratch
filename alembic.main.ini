# Per-database Alembic config: experiments ("main") database.
#
# Usage:
#   alembic -c alembic.main.ini -x db=main upgrade head
#
# `script_location` MUST be static here: Alembic resolves it (and thus the
# `versions/` directory) via ScriptDirectory.from_config() *before* env.py
# runs, so the dynamic `-x db=...` override inside env.py is too late to
# affect which migration scripts get applied.

[alembic]
script_location = alembic/main

# Template used when generating new migrations.
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(rev)s_%%(slug)s

prepend_sys_path = .
timezone = UTC

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
