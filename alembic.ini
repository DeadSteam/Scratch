# Alembic multi-database configuration.
#
# Usage (each database has its own -c config file, see alembic.<db>.ini):
#   alembic -c alembic.main.ini      -x db=main      upgrade head   # experiments database
#   alembic -c alembic.users.ini     -x db=users     upgrade head   # users database
#   alembic -c alembic.knowledge.ini -x db=knowledge upgrade head   # knowledge database
#
# `script_location` must be static per database: Alembic resolves it (and
# thus the `versions/` directory) via ScriptDirectory.from_config() *before*
# env.py runs, so a dynamic override inside env.py based on -x db=... is too
# late to affect which migration scripts get applied. This file is the
# default (no -c given) and targets the main (experiments) database, same as
# alembic.main.ini.

[alembic]
script_location = alembic/main

# Template used when generating new migrations.
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(rev)s_%%(slug)s

prepend_sys_path = .
timezone = UTC

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
